# ====================================
# PROMPT MULTILINEA
# ====================================
format = """
$os\
$username\
$hostname\
$localip\
$directory\
$nodejs\
$c\
$cpp\
$rust\
$golang\
$php\
$java\
$python\
$lua\
$docker_context\
$git_branch\
$git_commit\
$git_state\
$git_status\
$git_metrics\
$line_break\
$character"""

# ====================================
# PALETA DE COLORES (GRUVBOX DARK)
# ====================================
[palettes.gruvbox_dark]
color_fg0 = "#fbf1c7"
color_bg1 = "#3c3836"
color_bg3 = "#665c54"
color_blue = "#458588"
color_aqua = "#689d6a"
color_green = "#98971a"
color_orange = "#E86252"
color_purple = "#b16286"
color_red = "#AD2831"
color_rosa = "#DA6C7E"
color_yellow = "#d79921"

# ====================================
# OS
# ====================================
[os]
disabled = false
style = "fg:#fbf1c7"

[os.symbols]
Alpaquita = " "
Alpine = " "
AlmaLinux = " "
Amazon = " "
Android = " "
Arch = " "
Artix = " "
CentOS = " "
Debian = " "
DragonFly = " "
Emscripten = " "
EndeavourOS = " "
Fedora = " "
FreeBSD = " "
Garuda = "󰛓 "
Gentoo = " "
HardenedBSD = "󰞌 "
Illumos = "󰈸 "
Kali = " "
Linux = " "
Mabox = " "
Macos = " "
Manjaro = " "
Mariner = " "
MidnightBSD = " "
Mint = " "
NetBSD = " "
NixOS = " "
OpenBSD = "󰈺 "
openSUSE = " "
OracleLinux = "󰌷 "
Pop = " "
Raspbian = " "
Redhat = " "
RedHatEnterprise = " "
RockyLinux = " "
Redox = "󰀘 "
Solus = "󰠳 "
SUSE = " "
Ubuntu = " "
Unknown = " "
Void = " "
Windows = "󰍲 "

# ====================================
# USERNAME
# ====================================
[username]
show_always = true
style_user = "#fbf1c7"
style_root = "#fbf1c7"
format = "[ $user]($style)"

# ====================================
# HOSTNAME
# ====================================
[hostname]
ssh_only = false
format = "[$ssh_symbol](bold blue)  [$hostname](bold red) "
trim_at = ".companyname.com"
disabled = false

# ====================================
# LOCAL IP
# ====================================
[localip]
ssh_only = false
format = "󰈀[ $localipv4](bold #a7dbef)"
disabled = false

# ====================================
# DIRECTORY
# ====================================
[directory]
style = "fg:#06D6A0 bold"
format = "[ $path ]($style)[$read_only]($read_only_style) "

# Directorios de solo lectura
read_only = "  "
read_only_style = "red"

# Truncado
truncation_length = 2
truncation_symbol = "󰉓 "
truncate_to_repo = false

# Home directory
home_symbol = "~"

# Estilos para repos (si entras a uno)
# before_repo_root_style = "fg:#FFD166"
# repo_root_style = "fg:#118AB2 bold"

# Usa separador correcto según el SO
use_os_path_sep = true

[directory.substitutions]
"Desktop" = "  "
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Video" = " "
"Developer" = "󰲋 "

"Escritorio" = " "
"Documentos" = "󰈙 "
"Descargas" = " "
"Música" = "󰝚 "
"Imágenes" = " "
"Videos" = " "
"Desarrollo" = "󰲋 "

# ====================================
# NODEJS
# ====================================
[nodejs]
symbol = " "
format = "via [$symbol($version)]($style) "
version_format = "v${raw}"
detect_extensions = ["js", "mjs", "cjs", "ts", "mts", "cts"]
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]
style = "fg:#8BC34A bold"
disabled = false

# ====================================
# C
# ====================================
[c]
symbol = " "
format = "via [$symbol($version(-$name))]($style) "
version_format = "v${raw}"
detect_extensions = ["c", "h"]
detect_files = []
detect_folders = []
commands = [["cc", "--version"], ["gcc", "--version"], ["clang", "--version"]]
style = "fg:#FF9800 bold"
disabled = false

# ====================================
# C++
# ====================================
[cpp]
symbol = " "
format = "via [$symbol($version)]($style) "
version_format = "v${raw}"
detect_extensions = [
  "cpp",
  "cc",
  "cxx",
  "c++",
  "hpp",
  "hh",
  "hxx",
  "h++",
  "tcc"
]
detect_files = []
detect_folders = []
commands = [
  ["c++", "--version"],
  ["g++", "--version"],
  ["clang++", "--version"]
]
style = "fg:#FF9800 bold"
disabled = false

# ====================================
# RUST
# ====================================
[rust]
symbol = " "
format = "via [$symbol($version)]($style) "
version_format = "v${raw}"
detect_extensions = ["rs"]
detect_files = ["Cargo.toml"]
detect_folders = []
style = "fg:#E44D26 bold"
disabled = false

# ====================================
# GO
# ====================================
[golang]
symbol = " "
format = "via [$symbol($version)]($style) "
version_format = "v${raw}"
detect_extensions = ["go"]
detect_files = [
  "go.mod",
  "go.sum",
  "go.work",
  "glide.yaml",
  "Gopkg.yml",
  "Gopkg.lock",
  ".go-version"
]
detect_folders = ["Godeps"]
style = "fg:#00BCD4 bold"
disabled = false

# ====================================
# PHP
# ====================================
[php]
symbol = " "
format = "via [$symbol($version)]($style) "
version_format = "v${raw}"
detect_extensions = ["php"]
detect_files = ["composer.json", ".php-version"]
detect_folders = []
style = "fg:#8892BF bold"
disabled = false

# ====================================
# JAVA
# ====================================
[java]
symbol = " "
format = "via [$symbol($version)]($style) "
version_format = "v${raw}"
detect_extensions = ["java", "class", "gradle", "jar", "cljs", "cljc"]
detect_files = [
  "pom.xml",
  "build.gradle.kts",
  "build.sbt",
  ".java-version",
  "deps.edn",
  "project.clj",
  "build.boot",
  ".sdkmanrc"
]
detect_folders = []
style = "fg:#B22222 dimmed"
disabled = false

# ====================================
# PYTHON
# ====================================
[python]
symbol = " "
# format = '\[[${symbol}${pyenv_prefix}(${version})(\($virtualenv\))]($style)\]'
format = "via [$symbol($version $virtualenv)]($style) "
version_format = "v${raw}"
style = "fg:#FFD700 bold"
pyenv_version_name = false
pyenv_prefix = "pyenv"
python_binary = ["python", "python3", "python2"]
detect_extensions = ["py", "ipynb"]
detect_files = [
  ".python-version",
  "Pipfile",
  "__init__.py",
  "pyproject.toml",
  "requirements.txt",
  "setup.py",
  "tox.ini"
]
detect_folders = []
disabled = false

# ====================================
# LUA
# ====================================
[lua]
symbol = " "
format = "via [$symbol($version)]($style) "
version_format = "v${raw}"
detect_extensions = ["lua"]
detect_files = [".lua-version"]
# detect_folders = ["lua"]
detect_folders = []
lua_binary = "lua"
style = "fg:#1E90FF bold"
disabled = false

# ====================================
# DOCKER CONTEXT
# ====================================
[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "
only_with_files = true
detect_extensions = []
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]
detect_folders = []
style = "fg:#0077B6 bold"
disabled = false

# ====================================
# GIT BRANCH
# ====================================
[git_branch]
always_show_remote = false
format = "on [$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "fg:#9B59B6 bold"
truncation_length = 63
truncation_symbol = "…"
only_attached = false
ignore_branches = []
disabled = false

# ====================================
# GIT COMMIT
# ====================================
[git_commit]
commit_hash_length = 7
format = "[($hash$tag)]($style) "
style = "fg:#2ECC71 bold"
only_detached = false
tag_disabled = false
tag_max_candidates = 0
tag_symbol = "  "
disabled = false

# ====================================
# GIT STATE
# ====================================
[git_state]
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style = "fg:#FFD700 bold"
# format = '\([$state($progress_current/$progress_total)]($style)\) '
format = '\([$state $progress_current/$progress_total]($style)\) '
disabled = false

# ====================================
# GIT STATUS
# ====================================
[git_status]
format = "([$all_status$ahead_behind]($style) )"
conflicted = "="
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
up_to_date = ""
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
typechanged = ""
style = "fg:#E74C3C bold"
ignore_submodules = false
disabled = false
windows_starship = ""

# ====================================
# GIT METRICS
# ====================================
[git_metrics]
added_style = "fg:#2ECC71 bold"
deleted_style = "fg:#E74C3C bold"
only_nonzero_diffs = true
format = "([+$added]($added_style))([-$deleted]($deleted_style) )"
ignore_submodules = false
disabled = true

# ====================================
# CHARACTER
# ====================================
[character]
disabled = false
success_symbol = "[](bold fg:#689d6a)"
error_symbol = "[](bold fg:#AD2831)"
vimcmd_symbol = "[](bold fg:#AD2831)"
vimcmd_replace_one_symbol = "[](bold fg:#500B5B)"
vimcmd_replace_symbol = "[](bold fg:#500B5B)"
vimcmd_visual_symbol = "[](bold fg:#F5F500)"
