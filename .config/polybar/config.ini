[colors]
background = #282a36
foreground = #f8f8f2

alert = #ff5555

volume-min = #50fa7b
volume-med = #f1fa8c
volume-max = #ff5555

orange = #ffb86c
dark-orange = #ff9e64

green = #50fa7b
teal = #8be9fd
light-blue = #8be9fd
cyan = #8be9fd

blue = #6272a4
blurple = #bd93f9

purple = #bd93f9
light-purple = #f8f8f2
light-dark-purple = #6272a4
dark-purple = #44475a

beige = #f8f8f2

really-dark-purple = #282a36
black = #21222c
blacker = #1e1f29

[bar/bar1]
width = 100%
height = 22pt
radius = 6
fixed-center = true
dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt

; border-size = 4pt
; border-color = #00000000
border-size = 0

padding-left = 0
padding-right = 1

module-margin = 1


; separator = |
; separator-foreground = ${colors.disabled}

font-0 = "FiraCode Nerd Font Mono:size=12;2"
font-1 = "FiraCode Nerd Font Mono:size=10;2"
font-2 = "FiraCode Nerd Font Mono:size=8;2"
font-3 = "FiraCode Nerd Font Mono:size=6;2"

modules-left = i3
; modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date systray
modules-right = pulseaudio backlight memory cpu  wlan eth date battery temperature systray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3
override-redirect = false

[module/systray]
type = internal/tray

format = <tray>
tray-size = 60%+1
tray-spacing = 5px
tray-padding = 1px

format-margin = 6px
format-padding = 0px

format-background = ${colors.background-alt}
format-foreground = ${colors.foreground}

[module/xworkspaces]
type = internal/xworkspaces

format = <label-state>

label-focused = %icon%
label-focused-foreground = ${colors.primary}
label-focused-background = ${colors.background-alt}
label-focused-padding = 2

label-unfocused = %icon%
label-unfocused-padding = 2

label-visible = %icon%
label-visible-padding = 2

label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

ws-icon-1 = 1;ÔÄē
ws-icon-2 = 2;ÔĀĽ
ws-icon-3 = 3;ÔČę
ws-icon-4 = 4;Óěē
ws-icon-5 = 5;ÔĄ°
ws-icon-6 = 6;ůįąô
ws-icon-7 = 7;ÔĀĶ
ws-icon-8 = 8;ÔÄĀ
ws-icon-9 = 9;ÔÄĹ
ws-icon-0 = 0;ÔÄď
ws-icon-default = Óôé

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

format-mounted = <label-mounted>
format-unmounted = <label-unmounted>

label-mounted = ůįčä %mountpoint% %percentage_used%%
label-mounted-foreground = ${colors.blue}

label-unmounted = ůįÖõ %mountpoint% not mounted
label-unmounted-foreground = ${colors.alert}

label-mounted-font = 2

[module/pulseaudio]
type = internal/pulseaudio
interval = 5
use-ui-max = false ; 100%

label-volume = %percentage%%
format-volume = <ramp-volume> <label-volume>
format-volume-foreground = ${colors.foreground}

label-muted = ůįĖĀ
label-muted-foreground = ${colors.alert}

label-volume-font = 3

; Iconos seg√ļn volumen
ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®

; Colores por nivel (esto es clave)
ramp-volume-0-foreground = ${colors.volume-min}
ramp-volume-1-foreground = ${colors.volume-med}
ramp-volume-2-foreground = ${colors.volume-max}

click-right = pavucontrol

[module/backlight]
type = internal/backlight
card = amdgpu_bl1

format = <ramp> <label>
format-padding = 2px

label = %percentage%%
label-font = 3

; √ćconos (bajo ‚Üí medio ‚Üí alto)
ramp-0 = ůįÉě
ramp-1 = ůįÉü
ramp-2 = ůįÉ† 

; Colores
ramp-0-foreground = ${colors.green}
ramp-1-foreground = ${colors.dark-orange}
ramp-2-foreground = ${colors.volume-med}

[module/i3]
type = internal/i3

pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true

format = <label-state>

label-focused = %icon%
label-focused-foreground = ${colors.background}
label-focused-background = ${colors.blurple}
label-focused-padding = 2

label-unfocused = %icon%
label-unfocused-foreground = ${colors.foregorund}
label-unfocused-padding = 2

label-visible = %icon%
label-visible-foreground = ${colors.cyan}
label-visible-padding = 2

label-urgent = %icon%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 2

ws-icon-1 = 1;ÔÄē
ws-icon-2 = 2;ÔĀĽ
ws-icon-3 = 3;ÔČę
ws-icon-4 = 4;Óěē
ws-icon-5 = 5;ÔĄ°
ws-icon-6 = 6;ůįąô
ws-icon-7 = 7;ÔĀĶ
ws-icon-8 = 8;ÔÄĀ
ws-icon-9 = 9;ÔÄĹ
ws-icon-0 = 0;ÔÄď
ws-icon-default = Óôé

[module/xkeyboard]
type = internal/xkeyboard

blacklist-0 = num lock

format = <label-layout> <label-indicator>

label-layout = ‚Ć® %layout%
label-layout-font = 2
label-layout-foreground = ${colors.orange}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-font = 2
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.dark-orange}

[module/memory]
type = internal/memory
interval = 2

format-prefix = "ÓŅÖ"
format-prefix-foreground = ${colors.orange}

label = %used% / %total%
label-foreground = ${colors.foreground}
label-padding = 1
label-font = 2

[module/cpu]
type = internal/cpu
interval = 2

format-prefix = "Ôíľ"
format-prefix-foreground = ${colors.orange}

label = %percentage%%
label-foreground = ${colors.foreground}

label-padding = 1
label-font = 2

[network-base]
type = internal/network
interval = 5

format-connected = <label-connected>
format-disconnected = <label-disconnected>

label-disconnected = ůįĖ™
label-disconnected-foreground = ${colors.alert}

[module/wlan]
inherit = network-base
interface-type = wireless

; label-connected = "Ôáę %essid% ‚ÜĎ%upspeed% ‚Üď%downspeed%"
label-connected = "Ôáę %essid%"
label-connected-foreground = ${colors.orange}

label-padding = 1
label-connected-font = 2

[module/eth]
inherit = network-base
interface-type = wired

label-connected = ůįąÄ %local_ip%
label-connected-foreground = ${colors.orange}

label-padding = 1
label-connected-font = 2

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

format = ůį•Ē <label>

label = "%date%"
label-font = 2

label-foreground = ${colors.foregorund}
label-background = ${colors.background}
format-foreground = ${color.foreground}

[module/temperature]
type = internal/temperature
interval = 1

thermal-zone = 0  ; tu primer sensor acpitz

base-temperature = 20
warn-temperature = 60

units = false

format = <ramp> <label>
format-warn = <ramp> <label-warn>

; Label normal
label = %temperature-c%
label-font = 2
label-foreground = ${colors.foreground}

; Label de advertencia
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}
label-warn-font = 2

; Iconos de temperatura (fr√≠o ‚Üí caliente)
ramp-0 = Ôčč
ramp-1 = Ôčä
ramp-2 = ÔčČ
ramp-3 = Ôčą
ramp-4 = Ôčá

; Colores del icono (Dracula style)
ramp-0-foreground = ${colors.cyan}
ramp-1-foreground = ${colors.green}
ramp-2-foreground = ${colors.yellow}
ramp-3-foreground = ${colors.orange}
ramp-4-foreground = ${colors.alert}
ramp-font = 2

[module/battery]
type = internal/battery

battery = BAT1
adapter = ACAD
full-at = 99
low-at = 5
poll-interval = 5
time-format = %H:%M

; Formato principal
format-charging = <animation-charging> %percentage%%
format-discharging = <ramp-capacity> %percentage%%
format-full = %{F#a3be8c}ůįāĄ%{F-} 
format-low  = %{F#bf616a}ůįāÉ%{F-}

; Iconos de nivel de bater√≠a
ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

; Animaci√≥n mientras carga
animation-charging-0 = ÔČĄ
animation-charging-1 = ÔČÉ
animation-charging-2 = ÔČā
animation-charging-3 = ÔČĀ
animation-charging-4 = ÔČÄ
animation-charging-framerate = 750

; Animaci√≥n bater√≠a baja
animation-low-0 = !
animation-low-1 =
animation-low-framerate = 200

; Colores estilo Dracula para iconos (opcional, Polybar 3.7+)
ramp-0-foreground = ${colors.alert}
ramp-1-foreground = ${colors.orange}
ramp-2-foreground = ${colors.yellow}
ramp-3-foreground = ${colors.green}
ramp-4-foreground = ${colors.green}

; Colores para estados full y low
label-full-foreground = ${colors.green}   ; Full en verde
label-low-foreground  = ${colors.alert}   ; Low en rojo

; Fuente para todos los elementos
label-font = 2
ramp-font = 2
animation-charging-font = 2
animation-low-font = 2

[settings]
screenchange-reload = true
pseudo-transparency = false

; vim:ft=dosini
